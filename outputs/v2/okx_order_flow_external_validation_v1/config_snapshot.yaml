  - BTC-USDT
  - ETH-USDT
  alt_symbols:
  - XRP-USDT
  - SOL-USDT
  - DOGE-USDT
  - ADA-USDT
  - AVAX-USDT
sample_split:
  development_start: '2024-04-08T00:00:00Z'
  development_end_exclusive: '2025-04-08T00:00:00Z'
  oos_start: '2025-04-08T00:00:00Z'
  oos_end_exclusive: '2026-04-08T00:00:00Z'
analysis:
  fdr_alpha: 0.05
  hac_maxlags: 96
  alignment_minimum_assets: 6
  null_repetitions: 499
  null_seed: 20260723
